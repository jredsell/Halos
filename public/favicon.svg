<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="40%" stop-color="#2563eb" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0" />
    </radialGradient>
    
    <!-- Bright Ring Gradient -->
    <linearGradient id="ring" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#93c5fd" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <!-- Floating soft blue glow behind the primary ring -->
  <circle cx="50" cy="50" r="40" fill="url(#bgGlow)" />
  
  <!-- The absolute main Halo - bold, perfectly crisp geometric ring -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="url(#ring)" stroke-width="14" />
  
  <!-- Inner accent layer for 3D depth, positioned tightly to bottom half -->
  <path d="M 22 50 a 28 28 0 0 0 56 0" fill="none" stroke="#1d4ed8" stroke-width="14" opacity="0.5" stroke-linecap="round"/>
</svg>