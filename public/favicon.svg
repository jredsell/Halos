<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Deep premium dark gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f1f1f" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    
    <!-- Metallic silver ring gradient -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#d4d4d4" />
      <stop offset="100%" stop-color="#525252" />
    </linearGradient>

    <!-- Outer drop shadow/glow for the ring -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Edge-to-edge dark container (Squircle) for perfect contrast on any OS theme -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="url(#bg)" stroke="#333333" stroke-width="2" />
  
  <!-- Ambient metallic glow -->
  <circle cx="50" cy="50" r="25" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.3" filter="url(#glow)" />
  
  <!-- Crisp, bold, solid metallic Halo -->
  <circle cx="50" cy="50" r="25" fill="none" stroke="url(#ring)" stroke-width="7" />
</svg>